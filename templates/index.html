<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ground Station</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #f1f5f9; --sub: #94a3b8;
            --accent: #3b82f6; --success: #10b981; --danger: #ef4444;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 80px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* HEADER */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        h1 { font-size: 1.5rem; font-weight: 700; margin: 0; }
        .gear-btn { font-size: 1.4rem; cursor: pointer; color: var(--sub); }

        /* CARDS */
        .card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
        .card-header { font-size: 0.8rem; text-transform: uppercase; color: var(--sub); font-weight: 600; margin-bottom: 15px; }

        /* METRICS */
        .metric-row { display: flex; justify-content: space-between; align-items: flex-end; }
        .big-val { font-size: 2rem; font-weight: 700; font-family: 'JetBrains Mono'; }
        .sub-val { font-size: 0.9rem; color: var(--sub); margin-top: 5px; }

        /* HERO IMAGE */
        #hero-section { display: none; width: 100%; height: 300px; background-size: cover; background-position: center; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--border); position: relative; cursor: pointer; }
        .hero-overlay { position: absolute; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, rgba(15, 23, 42, 0.9)); border-radius: 0 0 12px 12px; }

        /* TASKS */
        .task-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #475569; display: inline-block; margin-right: 10px; }
        .status-dot.active { background: var(--success); box-shadow: 0 0 8px var(--success); }
        button { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
        .btn-stop { border-color: var(--danger); color: var(--danger); }
        .btn-stop:hover { background: var(--danger); color: white; }

        /* CALENDAR */
        .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .cal-arrow { font-size: 1.5rem; padding: 0 15px; cursor: pointer; user-select: none; }
        .cal-grid { display: grid; gap: 5px; }
        .cal-cell { background: rgba(255,255,255,0.03); padding: 10px; text-align: center; border-radius: 4px; cursor: pointer; position: relative; }
        .cal-cell.has-data::after { content: ''; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; background: var(--success); border-radius: 50%; }
        
        /* WEEK VIEW FIX */
        .week-container { width: 100%; display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .week-col { background: rgba(255,255,255,0.02); min-height: 120px; border-radius: 4px; padding: 5px; }
        .week-head { text-align: center; font-size: 0.75rem; color: var(--sub); margin-bottom: 5px; border-bottom: 1px solid var(--border); padding-bottom: 2px; }
        .week-item { background: var(--accent); font-size: 0.65rem; padding: 2px; border-radius: 2px; margin-bottom: 2px; text-align: center; }

        /* FILES GRID */
        .files-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .file-card { aspect-ratio: 16/9; background: #000; border-radius: 6px; overflow: hidden; cursor: pointer; border: 1px solid var(--border); position: relative; }
        .file-card img { width: 100%; height: 100%; object-fit: cover; }

        /* MODALS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { max-width: 100%; max-height: 100%; position: relative; text-align: center; }
        .modal img { max-width: 100vw; max-height: 80vh; object-fit: contain; }
        .close-icon { position: absolute; top: 20px; right: 20px; font-size: 2rem; color: white; cursor: pointer; z-index: 201; }
        
        .action-bar { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .icon-btn { font-size: 1.5rem; cursor: pointer; background: rgba(255,255,255,0.1); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.2); }
        .icon-btn:hover { background: var(--accent); border-color: var(--accent); }

        .pin-input { background: #000; border: 1px solid var(--border); color: white; padding: 10px; font-size: 1.2rem; text-align: center; width: 150px; border-radius: 8px; margin-bottom: 15px; }

    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Mission Control</h1>
            <div style="color: var(--sub); font-size: 0.9rem;">Dubai Station // Electro-L5</div>
        </div>
        <div class="gear-btn" onclick="openSettings()">⚙️</div>
    </header>

    <div id="hero-section" onclick="openLatest()">
        <div class="hero-overlay">
            <h3 style="margin:0; color:white;">Latest Downlink</h3>
            <div style="color:rgba(255,255,255,0.8); font-size:0.8rem;" id="hero-ts">--</div>
        </div>
    </div>

    <div class="grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 25px;">
        <div class="card">
            <div class="card-header">Next Pass (HRIT)</div>
            <div class="metric-row"><div class="big-val" id="pass-rel">--</div><div class="sub-val" id="pass-abs">--</div></div>
        </div>
        <div class="card">
            <div class="card-header">System</div>
            <div class="metric-row"><div class="big-val" id="temp">--°</div><div class="sub-val" id="disk">--%</div></div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">Controls</div>
        <div class="task-row">
            <div><span class="status-dot" id="dot-align"></span> RTL-TCP (Align)</div>
            <div><button onclick="viewLog('alignment')">Log</button> <button id="btn-align" onclick="toggle('align')">Start</button></div>
        </div>
        <div class="task-row">
            <div><span class="status-dot" id="dot-capture"></span> SatDump (Capture)</div>
            <div><button onclick="viewLog('capture')">Log</button> <button id="btn-capture" onclick="toggle('capture')">Start</button></div>
        </div>
        <div class="task-row">
            <div><span class="status-dot" id="dot-sync"></span> iCloud Sync</div>
            <div><button onclick="viewLog('sat-sync')">Log</button> <button id="btn-sync" onclick="toggle('sync')">Start</button></div>
        </div>
    </div>

    <div class="card">
        <div class="cal-nav">
            <div class="cal-arrow" onclick="navTime(-1)">‹</div>
            <span id="cal-title" style="font-weight:bold; font-size: 1.1rem;">--</span>
            <div class="cal-arrow" onclick="navTime(1)">›</div>
        </div>
        <div style="text-align:center; margin-bottom:10px;">
            <button onclick="setView('year')">Yr</button> <button onclick="setView('month')">Mo</button> <button onclick="setView('week')">Wk</button> <button onclick="setView('day')">Day</button>
            <button style="border-color:var(--accent); color:var(--accent); margin-left:10px;" onclick="playTimelapse()">▶ Play</button>
        </div>
        <div id="cal-grid"></div>
    </div>

    <div class="card">
        <div class="card-header">Archive</div>
        <div class="files-grid" id="files-grid"></div>
        <div style="text-align:center; margin-top:15px; display:flex; justify-content:center; gap:15px;">
            <button onclick="changePage(-1)">←</button> <span id="page-indicator" style="align-self:center; color:var(--sub)">1</span> <button onclick="changePage(1)">→</button>
        </div>
    </div>
</div>

<div class="modal" id="img-modal">
    <div class="close-icon" onclick="closeImgModal()">×</div>
    <div class="modal-content">
        <img id="modal-img" src="">
        <div class="action-bar">
            <div class="icon-btn" onclick="nativeShare()" title="Share">⏍</div>
            <div class="icon-btn" onclick="deleteCurrent()" title="Delete" style="border-color:var(--danger); color:var(--danger)">🗑</div>
        </div>
    </div>
</div>

<div class="modal" id="pin-modal">
    <div class="modal-content" style="background:var(--card); padding:30px; border-radius:12px; border:1px solid var(--border);">
        <h3>Security Access</h3>
        <p style="color:var(--sub); margin-bottom:15px;">Enter PIN to control ground station.</p>
        <input type="password" id="pin-input" class="pin-input" placeholder="PIN">
        <br>
        <button onclick="submitPin()" style="background:white; color:black; padding:10px 30px;">Unlock</button>
    </div>
</div>

<div class="modal" id="log-modal" onclick="if(event.target==this)this.style.display='none'">
    <div class="modal-content" style="width:90%; text-align:left;">
        <pre id="log-content" style="background:black; padding:15px; border-radius:8px; color:#a5b4fc; overflow:auto; max-height:60vh;">Loading...</pre>
    </div>
</div>

<div class="modal" id="settings-modal" onclick="if(event.target==this)this.style.display='none'">
    <div class="modal-content" style="background:var(--card); padding:20px; width:90%; max-width:400px; border-radius:12px;">
        <h3>Settings</h3>
        <p>Share Link:</p>
        <div style="background:black; padding:10px; border-radius:6px; font-family:'JetBrains Mono'; color:var(--accent); font-size:0.8rem; word-break:break-all;" id="share-link">Loading...</div>
    </div>
</div>

<script>
    // STATE
    let allFiles = []; let view = 'month'; let currDate = new Date(); let page = 0;
    let pendingAction = null; let userPin = null; let activeImgName = "";
    
    // INIT
    async function init() {
        // 1. Get Files
        const res = await fetch('/api/files'); allFiles = await res.json();
        
        // 2. Deep Link Check
        if(window.location.hash.startsWith("#img=")) {
            const img = window.location.hash.replace("#img=", "");
            openImg(img);
        } else if (allFiles.length > 0) {
            // Setup Hero
            document.getElementById('hero-section').style.display = 'block';
            document.getElementById('hero-section').style.backgroundImage = `url('/images/${allFiles[0].name}')`;
            document.getElementById('hero-ts').innerText = new Date(allFiles[0].ts*1000).toLocaleString();
        }

        renderCal(); renderFiles(); updateData();
        setInterval(updateData, 5000);
    }

    // DATA LOOP
    async function updateData() {
        const res = await fetch('/api/data'); const d = await res.json();
        
        document.getElementById('pass-rel').innerText = d.next_pass.relative;
        document.getElementById('pass-abs').innerText = d.next_pass.absolute;
        document.getElementById('temp').innerText = d.system.temp + "°";
        document.getElementById('disk').innerText = d.system.disk.percent + "%";
        document.getElementById('share-link').innerText = d.system.tunnel_url;

        updateBtn('align', d.tasks.align); updateBtn('capture', d.tasks.capture); updateBtn('sync', d.tasks.sync);
    }

    function updateBtn(name, active) {
        document.getElementById(`dot-${name}`).className = active ? "status-dot active" : "status-dot";
        const btn = document.getElementById(`btn-${name}`);
        btn.innerText = active ? "Stop" : "Start";
        btn.className = active ? "btn-stop" : "";
    }

    // CONTROLS & SECURITY
    function toggle(name) {
        const btn = document.getElementById(`btn-${name}`);
        const action = btn.innerText === "Start" ? `start_${name}` : "stop";
        secureAction(action, name);
    }

    function secureAction(action, target) {
        if(!userPin) {
            pendingAction = {action, target};
            document.getElementById('pin-modal').style.display = 'flex';
        } else {
            sendControl(action, target);
        }
    }

    async function submitPin() {
        const p = document.getElementById('pin-input').value;
        userPin = p;
        document.getElementById('pin-modal').style.display = 'none';
        if(pendingAction) {
            await sendControl(pendingAction.action, pendingAction.target);
            pendingAction = null;
        }
    }

    async function sendControl(action, target) {
        const res = await fetch('/api/control', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({action, target: target==='sync'?'sat-sync':(target==='align'?'alignment':'capture'), pin: userPin})
        });
        const d = await res.json();
        if(d.status === 'error') { alert("Incorrect PIN"); userPin = null; }
        else updateData();
    }

    // CALENDAR
    function renderCal() {
        const box = document.getElementById('cal-grid'); box.innerHTML = '';
        const title = document.getElementById('cal-title');
        
        if(view === 'month') {
            title.innerText = currDate.toLocaleString('default', {month:'long', year:'numeric'});
            box.style.gridTemplateColumns = 'repeat(7, 1fr)';
            const y = currDate.getFullYear(); const m = currDate.getMonth();
            const start = new Date(y, m, 1).getDay();
            const days = new Date(y, m+1, 0).getDate();

            for(let i=0; i<start; i++) box.innerHTML += '<div></div>';
            for(let d=1; d<=days; d++) {
                const has = hasData(y, m, d);
                box.innerHTML += `<div class="cal-cell ${has?'has-data':''}" onclick="dateClick(${d})">${d}</div>`;
            }
        } 
        else if (view === 'week') { // FIXED FULL WIDTH
            title.innerText = "Week View";
            box.innerHTML = `<div class="week-container"></div>`;
            const con = box.querySelector('.week-container');
            
            const start = new Date(currDate); start.setDate(currDate.getDate() - currDate.getDay());
            
            for(let i=0; i<7; i++) {
                const day = new Date(start); day.setDate(start.getDate()+i);
                const items = getFilesForRange(day, day);
                con.innerHTML += `
                    <div class="week-col">
                        <div class="week-head">${day.toLocaleDateString('default',{weekday:'short'})} ${day.getDate()}</div>
                        ${items.map(f => `<div class="week-item" onclick="openImg('${f.name}')">${new Date(f.ts*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>`).join('')}
                    </div>`;
            }
        }
    }

    function hasData(y, m, d) { return allFiles.some(f => { const t = new Date(f.ts*1000); return t.getFullYear()===y && t.getMonth()===m && t.getDate()===d; }); }
    function getFilesForRange(s, e) {
        const S = new Date(s); S.setHours(0,0,0,0); const E = new Date(e); E.setHours(23,59,59,999);
        return allFiles.filter(f => { const t = new Date(f.ts*1000); return t>=S && t<=E; });
    }

    function navTime(d) {
        if(view==='month') currDate.setMonth(currDate.getMonth()+d);
        if(view==='week') currDate.setDate(currDate.getDate()+(d*7));
        renderCal();
    }
    function setView(v) { view = v; renderCal(); }
    function dateClick(d) { currDate.setDate(d); setView('week'); } // Jump to week view on click

    // FILES & VIEWER
    function renderFiles() {
        const grid = document.getElementById('files-grid'); grid.innerHTML = '';
        const pageFiles = allFiles.slice(page*16, (page+1)*16);
        pageFiles.forEach(f => {
            grid.innerHTML += `<div class="file-card" onclick="openImg('${f.name}')"><img src="/images/${f.name}"></div>`;
        });
        document.getElementById('page-indicator').innerText = page + 1;
    }
    function changePage(d) { if(page+d >= 0) { page += d; renderFiles(); } }

    function openImg(name) {
        activeImgName = name;
        document.getElementById('img-modal').style.display = 'flex';
        document.getElementById('modal-img').src = `/images/${name}`;
        window.location.hash = `img=${name}`; // Deep Link
    }
    
    function closeImgModal() {
        document.getElementById('img-modal').style.display = 'none';
        history.pushState("", document.title, window.location.pathname + window.location.search); // Clear Hash
    }

    // NATIVE SHARE
    async function nativeShare() {
        if (navigator.share) {
            // We share the link to the image because sharing files requires Blobs which is trickier with simple HTTP
            // But if they are on mobile, sharing the deep link is perfect.
            try {
                await navigator.share({
                    title: 'Electro-L Capture',
                    text: 'Check out this satellite image from my Dubai Ground Station!',
                    url: window.location.href
                });
            } catch (err) { console.log('Share failed', err); }
        } else {
            alert("Sharing not supported on this browser. Copy the URL!");
        }
    }

    async function deleteCurrent() {
        if(confirm("Delete this image?")) {
            await fetch('/api/control', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'delete', filename:activeImgName, pin:userPin})});
            location.reload();
        }
    }

    // LOGS
    async function viewLog(s) {
        document.getElementById('log-modal').style.display = 'flex';
        const r = await fetch(`/api/logs/${s}`); const d = await r.json();
        document.getElementById('log-content').innerText = d.log;
    }

    function openSettings() { document.getElementById('settings-modal').style.display = 'flex'; }
    function openLatest() { if(allFiles.length>0) openImg(allFiles[0].name); }

    init();
</script>
</body>
</html>
