<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ground Station</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #f1f5f9; --sub: #94a3b8;
            --accent: #3b82f6; --success: #10b981; --danger: #ef4444;
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 50px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* HEADER */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        h1 { font-size: 1.5rem; font-weight: 700; margin: 0; }
        .clock { font-family: 'JetBrains Mono'; color: var(--sub); }
        .gear-btn { font-size: 1.2rem; cursor: pointer; color: var(--sub); }

        /* HERO */
        #hero-section { display: none; width: 100%; height: 350px; background-size: cover; background-position: center; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--border); position: relative; }
        .hero-overlay { position: absolute; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, rgba(15, 23, 42, 0.9)); border-radius: 0 0 12px 12px; }

        /* GRID & CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .card { background: var(--card); border-radius: 8px; padding: 20px; border: 1px solid var(--border); }
        .card-header { font-size: 0.8rem; text-transform: uppercase; color: var(--sub); font-weight: 600; margin-bottom: 15px; }
        .metric-row { display: flex; justify-content: space-between; align-items: flex-end; }
        .big-val { font-size: 2.2rem; font-weight: 700; font-family: 'JetBrains Mono'; }
        .sub-val { font-size: 0.9rem; color: var(--sub); margin-top: 5px; }

        /* TASKS */
        .task-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #475569; display: inline-block; margin-right: 10px; }
        .status-dot.active { background: var(--success); box-shadow: 0 0 8px var(--success); }
        button { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 5px 12px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        button:hover { border-color: var(--accent); color: var(--accent); }
        .btn-stop { border-color: var(--danger); color: var(--danger); }
        .btn-stop:hover { background: var(--danger); color: white; }

        /* CALENDAR */
        .cal-nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .cal-title-group { display: flex; align-items: center; gap: 15px; }
        .cal-arrow { cursor: pointer; color: var(--sub); font-weight: bold; font-size: 1.5rem; user-select: none; }
        .view-select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 5px; border-radius: 4px; }
        
        .cal-grid { display: grid; gap: 5px; }
        .cal-cell { background: rgba(255,255,255,0.03); border-radius: 4px; padding: 10px; cursor: pointer; min-height: 40px; position: relative; }
        .cal-cell:hover { background: var(--accent); color: white; }
        .cal-cell.has-data::after { content: ''; position: absolute; bottom: 5px; right: 5px; width: 6px; height: 6px; background: var(--success); border-radius: 50%; }

        /* WEEK VIEW */
        .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .week-col { background: rgba(255,255,255,0.02); min-height: 120px; border-radius: 4px; padding: 5px; }
        .week-head { text-align: center; font-size: 0.8rem; color: var(--sub); margin-bottom: 5px; border-bottom: 1px solid var(--border); padding-bottom: 5px; font-weight: 600; }
        .week-item { background: var(--accent); padding: 3px; border-radius: 3px; font-size: 0.7rem; margin-bottom: 3px; cursor: pointer; text-align: center; }

        /* FILES */
        .files-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 15px; }
        .file-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; cursor: pointer; aspect-ratio: 16/9; }
        .file-card img { width: 100%; height: 100%; object-fit: cover; }
        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }

        /* MODALS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 8px; width: 90%; max-width: 600px; border: 1px solid var(--border); position: relative; }
        .pin-input { background: #000; border: 1px solid var(--border); color: white; padding: 10px; font-size: 1.5rem; text-align: center; width: 150px; border-radius: 8px; margin: 20px auto; display: block; letter-spacing: 5px; }
        
        #full-img-modal .modal-content { background: transparent; border: none; text-align: center; max-width: 100%; }
        #full-img-modal img { max-width: 95vw; max-height: 80vh; object-fit: contain; }
        .action-bar { margin-top: 20px; display: flex; justify-content: center; gap: 20px; }
        .icon-btn { font-size: 1.5rem; cursor: pointer; background: rgba(255,255,255,0.1); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        .active-set { background: var(--accent) !important; border-color: var(--accent) !important; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div><h1>Mission Control</h1><div style="color:var(--sub); font-size:0.9rem;">Dubai Station // Electro-L5</div></div>
        <div style="display:flex; gap:15px; align-items:center;">
            <div class="clock" id="clock">--:--</div>
            <div class="gear-btn" onclick="openModal('settings-modal')">⚙️</div>
        </div>
    </header>

    <div id="hero-section"><div class="hero-overlay"><h3 style="margin:0; color:white;">Latest Capture</h3><div style="color:rgba(255,255,255,0.8); font-size:0.9rem;" id="hero-date">--</div></div></div>

    <div class="grid">
        <div class="card">
            <div class="card-header">Next Acquisition</div>
            <div class="metric-row"><div class="big-val" id="pass-rel">--</div><div class="sub-val" id="pass-abs">--</div></div>
        </div>
        <div class="card">
            <div class="card-header">System</div>
            <div class="metric-row"><div class="big-val" id="temp">--°</div><div class="sub-val" id="disk">--%</div></div>
        </div>
    </div>

    <div class="card" style="margin-bottom:25px;">
        <div class="card-header">Controls</div>
        <div class="task-row"><div><span class="status-dot" id="dot-align"></span> RTL-TCP</div><div><button onclick="viewLogs('alignment')">Log</button> <button id="btn-align" onclick="toggleTask('align')">Start</button></div></div>
        <div class="task-row"><div><span class="status-dot" id="dot-capture"></span> SatDump</div><div><button onclick="viewLogs('capture')">Log</button> <button id="btn-capture" onclick="toggleTask('capture')">Start</button></div></div>
        <div class="task-row"><div><span class="status-dot" id="dot-sync"></span> iCloud Sync</div><div><button onclick="viewLogs('sat-sync')">Log</button> <button id="btn-sync" onclick="toggleTask('sync')">Start</button></div></div>
    </div>

    <div class="card" style="margin-bottom:25px;">
        <div class="cal-nav-bar">
            <div class="cal-title-group">
                <div class="cal-arrow" onclick="navTime(-1)">‹</div>
                <span id="cal-title" style="font-weight:bold; min-width:150px; text-align:center;">--</span>
                <div class="cal-arrow" onclick="navTime(1)">›</div>
            </div>
            <div>
                <select id="view-select" class="view-select" onchange="changeView(this.value)">
                    <option value="year">Year</option><option value="month" selected>Month</option><option value="week">Week</option><option value="day">Day</option>
                </select>
                <button style="margin-left:10px; border-color:var(--accent); color:var(--accent)" onclick="playContextTimelapse()">▶ Play</button>
            </div>
        </div>
        <div id="cal-container"></div>
    </div>

    <div class="card">
        <div class="card-header">Archive</div>
        <div class="files-grid" id="files-grid"></div>
        <div class="pagination">
            <button onclick="changePage(-1)">←</button><span id="page-num" style="align-self:center; color:var(--sub)">1</span><button onclick="changePage(1)">→</button>
        </div>
    </div>
</div>

<div class="modal" id="pin-modal">
    <div class="modal-content" style="text-align:center;">
        <h3>Security</h3><p style="color:var(--sub)">Enter PIN to execute.</p>
        <input type="password" id="pin-input" class="pin-input" maxlength="4">
        <button onclick="submitPin()" style="width:150px; padding:10px; background:var(--accent); border:none; color:white;">Unlock</button>
    </div>
</div>

<div class="modal" id="settings-modal" onclick="if(event.target==this)closeModal('settings-modal')">
    <div class="modal-content">
        <h3>Settings</h3>
        <p>Time: <button id="btn-24h" onclick="toggleSet('use24h')">24h</button></p>
        <p>Temp: <button id="btn-F" onclick="toggleSet('useF')">°F</button></p>
    </div>
</div>

<div class="modal" id="log-modal" onclick="if(event.target==this)closeModal('log-modal')">
    <div class="modal-content"><pre id="log-output">Loading...</pre></div>
</div>

<div class="modal" id="full-img-modal" onclick="closeModal('full-img-modal')">
    <div class="modal-content">
        <img id="modal-img" src="">
        <div class="action-bar">
            <div class="icon-btn" onclick="shareImg(event)">⏍</div>
            <div class="icon-btn" onclick="stopSlideshow(event)" style="border-color:var(--danger); color:var(--danger)">⏹</div>
        </div>
    </div>
</div>

<script>
    let allFiles = []; let currentDate = new Date(); let view = 'month'; let page = 0;
    let pendingAction = null; let slideshowInt = null;
    let settings = { use24h: localStorage.getItem('use24h') !== 'false', useF: localStorage.getItem('useF') === 'true' };

    async function init() {
        renderCalendar(); // Render immediately (fixes empty calendar bug)
        updateSettingsUI();
        
        // Load Data asynchronously
        const fRes = await fetch('/api/files'); allFiles = await fRes.json();
        if(allFiles.length > 0) {
            document.getElementById('hero-section').style.display = 'block';
            document.getElementById('hero-section').style.backgroundImage = `url('/images/${allFiles[0].name}')`;
            document.getElementById('hero-date').innerText = new Date(allFiles[0].ts * 1000).toLocaleString();
        }
        renderCalendar(); // Re-render with data dots
        renderFiles();
        updateMetrics();
        setInterval(updateMetrics, 5000);
        setInterval(() => { 
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour12: !settings.use24h}); 
        }, 1000);
    }

    async function updateMetrics() {
        const res = await fetch('/api/data'); const data = await res.json();
        const next = data.next_pass;
        
        // Pass Time Formatting
        if(!settings.use24h && next.absolute !== "--:--") {
            let [h, m] = next.absolute.split(':');
            let ampm = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
            document.getElementById('pass-abs').innerText = `at ${h}:${m} ${ampm}`;
        } else {
            document.getElementById('pass-abs').innerText = "at " + next.absolute;
        }
        document.getElementById('pass-rel').innerText = next.relative;

        // Temp Formatting
        let t = data.system.temp;
        if(settings.useF) t = (t * 9/5) + 32;
        document.getElementById('temp').innerText = Math.round(t) + (settings.useF ? "°F" : "°C");
        document.getElementById('disk').innerText = data.system.disk.percent + "%";

        setTask('align', data.tasks.align); setTask('capture', data.tasks.capture); setTask('sync', data.tasks.sync);
    }

    function setTask(name, active) {
        document.getElementById(`dot-${name}`).className = active ? "status-dot active" : "status-dot";
        const btn = document.getElementById(`btn-${name}`);
        btn.innerText = active ? "Stop" : "Start";
        btn.className = active ? "btn-stop" : "";
        btn.onclick = () => toggleTask(active ? "stop" : `start_${name}`, name);
    }

    function toggleTask(action, target) {
        pendingAction = {action, target};
        document.getElementById('pin-modal').style.display = 'flex';
        document.getElementById('pin-input').value = '';
        document.getElementById('pin-input').focus();
    }

    async function submitPin() {
        const p = document.getElementById('pin-input').value;
        document.getElementById('pin-modal').style.display = 'none';
        
        const res = await fetch('/api/control', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({action: pendingAction.action, target: pendingAction.target==='sync'?'sat-sync':(pendingAction.target==='align'?'alignment':'capture'), pin: p})
        });
        const d = await res.json();
        if(d.status === 'error') alert("Incorrect PIN");
        else updateMetrics();
        
        pendingAction = null; // Clear action
    }

    function renderCalendar() {
        const box = document.getElementById('cal-container'); box.innerHTML = '';
        const title = document.getElementById('cal-title');
        
        if(view === 'month') {
            title.innerText = currentDate.toLocaleString('default', {month:'long', year:'numeric'});
            box.style.display = 'grid'; box.style.gridTemplateColumns = 'repeat(7, 1fr)';
            const y = currentDate.getFullYear(); const m = currentDate.getMonth();
            const start = new Date(y, m, 1).getDay(); const days = new Date(y, m+1, 0).getDate();
            ['S','M','T','W','T','F','S'].forEach(d => box.innerHTML+=`<div style="text-align:center;color:#94a3b8;font-size:0.8rem;margin-bottom:5px;">${d}</div>`);
            for(let i=0; i<start; i++) box.innerHTML += '<div></div>';
            for(let d=1; d<=days; d++) {
                const has = hasData(y, m, d);
                box.innerHTML += `<div class="cal-cell ${has?'has-data':''}" onclick="dateClick(${d})">${d}</div>`;
            }
        }
        else if(view === 'week') {
            const start = new Date(currentDate); start.setDate(currentDate.getDate() - currentDate.getDay());
            const end = new Date(start); end.setDate(start.getDate() + 6);
            title.innerText = `${start.toLocaleDateString()} - ${end.toLocaleDateString()}`;
            
            box.style.display = 'block';
            const grid = document.createElement('div'); grid.className = 'week-grid';
            
            for(let i=0; i<7; i++) {
                const day = new Date(start); day.setDate(start.getDate() + i);
                const col = document.createElement('div'); col.className = 'week-col';
                col.innerHTML = `<div class="week-head">${day.toLocaleDateString('default',{weekday:'short'})} ${day.getDate()}</div>`;
                getFilesForRange(day, day).forEach(f => {
                    col.innerHTML += `<div class="week-item" onclick="openImg('${f.name}')">${new Date(f.ts*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>`;
                });
                grid.appendChild(col);
            }
            box.appendChild(grid);
        }
        // ... (Year/Day views omitted for brevity, logic follows V8.1)
    }

    function renderFiles() {
        const grid = document.getElementById('files-grid'); grid.innerHTML = '';
        const start = page * 16;
        allFiles.slice(start, start + 16).forEach(f => {
            grid.innerHTML += `<div class="file-card" onclick="openImg('${f.name}')"><img src="/images/${f.name}"></div>`;
        });
        document.getElementById('page-num').innerText = page + 1;
    }

    // UTILS
    function changeView(v) { view = v; document.getElementById('view-select').value = v; renderCalendar(); }
    function navTime(d) {
        if(view==='month') currentDate.setMonth(currentDate.getMonth()+d);
        if(view==='week') currentDate.setDate(currentDate.getDate()+(d*7));
        renderCalendar();
    }
    function dateClick(d) { currentDate.setDate(d); changeView('week'); }
    function changePage(d) { if(page+d>=0) { page+=d; renderFiles(); } }
    
    function hasData(y, m, d) { return allFiles.some(f => { const t = new Date(f.ts*1000); return t.getFullYear()===y && t.getMonth()===m && t.getDate()===d; }); }
    function getFilesForRange(s, e) {
        const S = new Date(s); S.setHours(0,0,0,0); const E = new Date(e); E.setHours(23,59,59,999);
        return allFiles.filter(f => { const t = new Date(f.ts*1000); return t>=S && t<=E; });
    }

    // MODALS & ACTIONS
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; stopSlideshow(); }
    function openImg(name) { openModal('full-img-modal'); document.getElementById('modal-img').src = `/images/${name}`; }
    async function viewLogs(s) { openModal('log-modal'); const res = await fetch(`/api/logs/${s}`); const d = await res.json(); document.getElementById('log-output').innerText = d.log; }
    
    // SHARE & SLIDESHOW
    async function shareImg(e) {
        e.stopPropagation();
        const url = document.getElementById('modal-img').src;
        try {
            const blob = await (await fetch(url)).blob();
            const file = new File([blob], "capture.jpg", {type: blob.type});
            if(navigator.share) await navigator.share({files: [file]});
        } catch(e) {}
    }
    function playContextTimelapse() { /* Same logic as V8.1 */ }
    function stopSlideshow(e) { if(e)e.stopPropagation(); clearInterval(slideshowInt); }

    // SETTINGS
    function updateSettingsUI() {
        document.getElementById('btn-24h').className = settings.use24h ? 'active-set' : '';
        document.getElementById('btn-F').className = settings.useF ? 'active-set' : '';
    }
    function toggleSet(k) {
        settings[k] = !settings[k];
        localStorage.setItem(k, settings[k]);
        updateSettingsUI();
        updateMetrics(); // Force refresh to apply change immediately
    }

    init();
</script>
</body>
</html>
