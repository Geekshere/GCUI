<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elektro-L Ground Station</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --border: rgba(255,255,255,0.1);
            --text: #f1f5f9; --text-dim: #94a3b8;
            --accent: #3b82f6; --success: #10b981; --danger: #ef4444;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            overflow-x: hidden; min-height: 100vh;
        }
        
        /* PARALLAX BACKGROUND */
        #grid-bg {
            position: fixed; top: -5%; left: -5%; width: 110%; height: 110%;
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1; opacity: 0.3;
            transition: transform 0.1s ease-out;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* HEADER */
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
        h1 { font-size: 1.5rem; font-weight: 700; margin: 0; }
        .badge { background: var(--accent); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }

        /* DASHBOARD GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; backdrop-filter: blur(10px);
        }
        .card-title { color: var(--text-dim); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 0.05em; }

        /* METRICS */
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .big-stat { font-size: 2rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
        .sub-stat { color: var(--text-dim); font-size: 0.9rem; }

        /* SCHEDULE LIST */
        .schedule-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .schedule-item:last-child { border: none; }
        .time-badge { font-family: 'JetBrains Mono', monospace; background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 4px; }

        /* CONTROLS */
        .control-group { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #475569; display: inline-block; margin-right: 8px; }
        .status-dot.active { background: var(--success); box-shadow: 0 0 8px var(--success); }
        
        button {
            background: transparent; border: 1px solid var(--border); color: var(--text);
            padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-family: 'Inter', sans-serif;
        }
        button:hover { background: var(--accent); border-color: var(--accent); }
        .btn-danger:hover { background: var(--danger); border-color: var(--danger); }

        /* FILE TABLE */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        th { text-align: left; color: var(--text-dim); padding: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 10px; border-bottom: 1px solid var(--border); }
        tr:hover { background: rgba(255,255,255,0.02); }
        .action-links a { color: var(--accent); text-decoration: none; margin-right: 10px; cursor: pointer; }
        .action-links span { color: var(--danger); cursor: pointer; }

        /* GALLERY & MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; }
        .modal img { max-width: 95%; max-height: 85vh; border-radius: 8px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .modal-controls { position: absolute; bottom: 20px; display: flex; gap: 20px; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 30px; backdrop-filter: blur(5px); }
        .player-bar { width: 100%; height: 4px; background: #333; margin-top: 10px; position: relative; }
        .player-progress { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s linear; }

    </style>
</head>
<body>
    <div id="grid-bg"></div>

    <div class="container">
        <header>
            <div>
                <h1>Mission Control</h1>
                <div style="color: var(--text-dim); font-size: 0.9rem; margin-top:5px;">Dubai Ground Station // 76°E</div>
            </div>
            <div class="badge" id="clock">00:00:00</div>
        </header>

        <div class="grid">
            <div class="card">
                <div class="card-title">System Vitals</div>
                <div class="stat-row">
                    <div>
                        <div class="sub-stat">CPU Temp</div>
                        <div class="big-stat" id="cpu-temp">--°</div>
                    </div>
                    <div style="text-align: right">
                        <div class="sub-stat">Storage</div>
                        <div class="big-stat" id="disk-percent">--%</div>
                    </div>
                </div>
                <div class="sub-stat" style="text-align: right" id="disk-detail">-- / --</div>
            </div>

            <div class="card">
                <div class="card-title">Acquisition Schedule (GST)</div>
                <div id="schedule-list">Loading...</div>
            </div>

            <div class="card">
                <div class="card-title">Active Tasks</div>
                <div class="control-group">
                    <div><span class="status-dot" id="dot-align"></span> Alignment (1693 MHz)</div>
                    <button id="btn-align" onclick="toggleTask('align')">Start</button>
                </div>
                <div class="control-group">
                    <div><span class="status-dot" id="dot-capture"></span> HRIT Capture (1691 MHz)</div>
                    <button id="btn-capture" onclick="toggleTask('capture')">Start</button>
                </div>
                <div class="control-group">
                    <div><span class="status-dot" id="dot-sync"></span> Cloud Sync</div>
                    <button id="btn-sync" onclick="toggleTask('sync')">Start</button>
                </div>
            </div>
        </div>

        <div class="card" style="margin-top: 20px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div class="card-title" style="margin-bottom:0">Data Library</div>
                <button onclick="playTimelapse()">▶ Play Timelapse</button>
            </div>
            <table>
                <thead>
                    <tr><th>Filename</th><th>Date</th><th>Size</th><th>Actions</th></tr>
                </thead>
                <tbody id="file-table"></tbody>
            </table>
        </div>
    </div>

    <div class="modal" id="gallery-modal">
        <img id="modal-img" src="">
        <div class="modal-controls">
            <button onclick="changeSlide(-1)">← Prev</button>
            <span id="slide-counter" style="align-self:center; font-family:'JetBrains Mono'">0/0</span>
            <button onclick="changeSlide(1)">Next →</button>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        // PARALLAX BACKGROUND
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 20;
            const y = (e.clientY / window.innerHeight) * 20;
            document.getElementById('grid-bg').style.transform = `translate(-${x}px, -${y}px)`;
        });

        // CLOCK
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        let files = [];
        let slideIndex = 0;
        let playInterval;

        async function refresh() {
            try {
                // DASHBOARD DATA
                const res = await fetch('/api/dashboard');
                const data = await res.json();
                
                document.getElementById('cpu-temp').innerText = data.stats.cpu + "°";
                document.getElementById('disk-percent').innerText = data.stats.disk_percent + "%";
                document.getElementById('disk-detail').innerText = data.stats.disk_text;

                // Update Tasks
                updateBtn('align', data.tasks.align);
                updateBtn('capture', data.tasks.capture);
                updateBtn('sync', data.tasks.sync);

                // Update Schedule
                const schedList = document.getElementById('schedule-list');
                schedList.innerHTML = data.schedule.map(s => `
                    <div class="schedule-item">
                        <span class="time-badge">${s.time_str}</span>
                        <span style="color:var(--accent)">T-Minus ${s.countdown}</span>
                    </div>
                `).join('');

                // FILES
                const fRes = await fetch('/api/files');
                files = await fRes.json();
                const table = document.getElementById('file-table');
                table.innerHTML = files.map(f => `
                    <tr>
                        <td style="font-family:'JetBrains Mono'">${f.name}</td>
                        <td>${f.date}</td>
                        <td>${f.size}</td>
                        <td class="action-links">
                            <a href="#" onclick="viewImage('${f.name}')">View</a>
                            <a href="/images/${f.name}" download>Download</a>
                            <span onclick="deleteFile('${f.name}')" class="btn-danger">Delete</span>
                        </td>
                    </tr>
                `).join('');

            } catch(e) { console.log(e); }
        }

        function updateBtn(task, active) {
            const dot = document.getElementById(`dot-${task}`);
            const btn = document.getElementById(`btn-${task}`);
            dot.className = active ? "status-dot active" : "status-dot";
            btn.innerText = active ? "Stop" : "Start";
            btn.className = active ? "btn-danger" : "";
            btn.onclick = () => sendControl(active ? "stop" : `start_${task}`, task);
        }

        async function sendControl(action, target) {
            await fetch('/api/control', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action, target: target === 'sync' ? 'sat-sync' : (target === 'align' ? 'alignment' : 'capture')})
            });
            setTimeout(refresh, 500);
        }

        async function deleteFile(name) {
            if(!confirm("Delete " + name + "?")) return;
            await fetch('/api/delete', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({filename: name})
            });
            refresh();
        }

        // GALLERY FUNCTIONS
        function viewImage(name) {
            slideIndex = files.findIndex(f => f.name === name);
            showSlide();
            document.getElementById('gallery-modal').style.display = 'flex';
        }
        
        function showSlide() {
            if(slideIndex >= files.length) slideIndex = 0;
            if(slideIndex < 0) slideIndex = files.length - 1;
            const f = files[slideIndex];
            document.getElementById('modal-img').src = `/images/${f.name}`;
            document.getElementById('slide-counter').innerText = `${slideIndex + 1}/${files.length}`;
        }

        function changeSlide(n) {
            slideIndex += n;
            showSlide();
        }

        function closeModal() {
            document.getElementById('gallery-modal').style.display = 'none';
            clearInterval(playInterval);
        }

        function playTimelapse() {
            if(files.length === 0) return alert("No images to play!");
            slideIndex = files.length - 1; // Start from oldest
            document.getElementById('gallery-modal').style.display = 'flex';
            playInterval = setInterval(() => {
                slideIndex--;
                if(slideIndex < 0) {
                    clearInterval(playInterval); // Stop at end
                } else {
                    showSlide();
                }
            }, 200); // 200ms per frame
        }

        refresh();
        setInterval(refresh, 5000); // Poll every 5s
    </script>
</body>
</html>
