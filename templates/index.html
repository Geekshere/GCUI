<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dubai Ground Station</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* SLATE BLUE THEME (Neutral, Pi-hole style) */
            --bg: #0f172a;       /* Dark Slate Background */
            --card: #1e293b;     /* Lighter Slate Panel */
            --border: #334155;   /* Border Line */
            --text: #f1f5f9;     /* White/Grey Text */
            --sub: #94a3b8;      /* Dim Text */
            --accent: #3b82f6;   /* Royal Blue */
            --success: #10b981;  /* Green */
            --danger: #ef4444;   /* Red */
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 50px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* HEADER */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        h1 { font-size: 1.5rem; font-weight: 700; margin: 0; color: var(--text); }
        .clock { font-family: 'JetBrains Mono'; color: var(--sub); }
        .gear-btn { font-size: 1.2rem; cursor: pointer; color: var(--sub); }
        .gear-btn:hover { color: var(--accent); }

        /* HERO IMAGE */
        #hero-section { display: none; width: 100%; height: 350px; background-size: cover; background-position: center; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--border); position: relative; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .hero-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, rgba(15, 23, 42, 0.9)); border-radius: 0 0 12px 12px; }

        /* CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .card { background: var(--card); border-radius: 8px; padding: 20px; border: 1px solid var(--border); }
        .card-header { font-size: 0.8rem; text-transform: uppercase; color: var(--sub); font-weight: 600; margin-bottom: 15px; letter-spacing: 0.5px; }

        /* METRICS */
        .metric-row { display: flex; justify-content: space-between; align-items: flex-end; }
        .big-val { font-size: 2.2rem; font-weight: 700; font-family: 'JetBrains Mono'; line-height: 1; }
        .sub-val { font-size: 0.9rem; color: var(--sub); margin-top: 5px; }
        .detail-row { margin-top: 15px; font-size: 0.85rem; color: var(--sub); display: flex; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }

        /* TASKS */
        .task-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .task-row:last-child { border: none; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #475569; display: inline-block; margin-right: 10px; }
        .status-dot.active { background: var(--success); box-shadow: 0 0 8px var(--success); }
        button { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 5px 12px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        button:hover { border-color: var(--accent); color: var(--accent); }
        .btn-stop { border-color: var(--danger); color: var(--danger); }
        .btn-stop:hover { background: var(--danger); color: white; }

        /* --- THE MEGA CALENDAR --- */
        .cal-nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .view-select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 5px; border-radius: 4px; }
        
        /* General Grid for Month/Year */
        .cal-grid { display: grid; gap: 5px; }
        .cal-cell { background: rgba(255,255,255,0.03); border-radius: 4px; padding: 10px; cursor: pointer; min-height: 40px; position: relative; }
        .cal-cell:hover { background: var(--accent); color: white; }
        .cal-cell.empty { background: transparent; cursor: default; }
        .cal-cell.has-data::after { content: ''; position: absolute; bottom: 5px; right: 5px; width: 6px; height: 6px; background: var(--success); border-radius: 50%; }

        /* Day View List */
        .day-list { display: flex; flex-direction: column; gap: 10px; }
        .day-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 6px; display: flex; align-items: center; gap: 15px; cursor: pointer; border: 1px solid transparent; }
        .day-item:hover { border-color: var(--accent); }
        .day-thumb { width: 80px; height: 60px; object-fit: cover; border-radius: 4px; }

        /* Week View Columns */
        .week-cols { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .week-col { background: rgba(255,255,255,0.02); padding: 10px; border-radius: 6px; min-height: 200px; }
        .week-header { text-align: center; margin-bottom: 10px; font-weight: bold; color: var(--sub); border-bottom: 1px solid var(--border); padding-bottom: 5px; }

        /* ALL FILES GRID */
        .files-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 15px; }
        .file-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; cursor: pointer; }
        .file-card img { width: 100%; height: 80px; object-fit: cover; }
        .file-info { padding: 5px; font-size: 0.7rem; color: var(--sub); }

        /* MODALS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { max-width: 90%; max-height: 90vh; text-align: center; position: relative; }
        .modal img { max-width: 100%; max-height: 80vh; border-radius: 4px; }
        .close-modal { position: absolute; top: -30px; right: 0; color: white; cursor: pointer; font-size: 1.5rem; }

    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Mission Control</h1>
            <div style="color: var(--sub); font-size: 0.9rem;">Dubai Station // Electro-L5</div>
        </div>
        <div style="display:flex; gap:15px; align-items:center;">
            <div class="clock" id="clock">--:--</div>
            <div class="gear-btn" onclick="openSettings()">⚙️</div>
        </div>
    </header>

    <div id="hero-section">
        <div class="hero-overlay">
            <h3 style="margin:0; color:white;">Latest Capture</h3>
            <div style="color:rgba(255,255,255,0.8); font-size:0.9rem;" id="hero-date">--</div>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="card-header">Next Acquisition</div>
            <div class="metric-row">
                <div class="big-val" id="pass-relative">--h --m</div>
                <div class="sub-val" id="pass-absolute">at --:--</div>
            </div>
            <div class="detail-row">
                <span>Target: 76°E (HRIT)</span>
                <span style="color:var(--accent)">Scheduled</span>
            </div>
        </div>

        <div class="card">
            <div class="card-header">Storage</div>
            <div class="metric-row">
                <div class="big-val" id="disk-percent">--%</div>
            </div>
            <div class="detail-row">
                <span id="disk-details">-- GB / -- GB</span>
                <span>SD Card</span>
            </div>
        </div>

        <div class="card">
            <div class="card-header">System Health</div>
            <div class="metric-row">
                <div class="big-val" id="temp">--°</div>
            </div>
            <div class="detail-row">
                <span>Core Temp</span>
                <span style="color:var(--success)">Nominal</span>
            </div>
        </div>
    </div>

    <div class="card" style="margin-bottom: 25px;">
        <div class="card-header">Active Processes</div>
        <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:10px; margin-bottom:0;">
            <div class="task-row">
                <div><span class="status-dot" id="dot-align"></span> RTL-TCP</div>
                <button id="btn-align" onclick="toggleTask('align')">Start</button>
            </div>
            <div class="task-row">
                <div><span class="status-dot" id="dot-capture"></span> SatDump</div>
                <button id="btn-capture" onclick="toggleTask('capture')">Start</button>
            </div>
            <div class="task-row">
                <div><span class="status-dot" id="dot-sync"></span> iCloud Sync</div>
                <button id="btn-sync" onclick="toggleTask('sync')">Start</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="cal-nav-bar">
            <div>
                <button onclick="calBack()">← Back</button>
                <span id="cal-title" style="font-weight:bold; margin:0 15px;">2026</span>
            </div>
            <div>
                <select id="view-select" class="view-select" onchange="changeView(this.value)">
                    <option value="year">Year</option>
                    <option value="month" selected>Month</option>
                    <option value="week">Week</option>
                    <option value="day">Day</option>
                </select>
                <button style="margin-left:10px; border-color:var(--accent); color:var(--accent)" onclick="playContextTimelapse()">▶ Play Timelapse</button>
            </div>
        </div>
        
        <div id="cal-container">
            </div>
    </div>

    <div class="card">
        <div class="card-header">All Files Archive</div>
        <div class="files-grid" id="files-grid">
            </div>
    </div>

</div>

<div class="modal" id="viewer-modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">×</span>
        <img id="modal-img" src="">
        <div style="margin-top:10px; color:white;">
            <span id="modal-counter"></span>
            <br>
            <button onclick="stopSlideshow()">Stop</button>
        </div>
    </div>
</div>

<script>
    // --- STATE ---
    let allFiles = []; // {name, ts, size_mb}
    let view = 'month'; // year, month, week, day
    let currentDate = new Date();
    let slideshowInterval = null;

    // --- INIT ---
    async function loadData() {
        // Load Files
        const fRes = await fetch('/api/files');
        allFiles = await fRes.json();

        // Update Hero
        if(allFiles.length > 0) {
            const latest = allFiles[0];
            const hero = document.getElementById('hero-section');
            hero.style.display = 'block';
            hero.style.backgroundImage = `url('/images/${latest.name}')`;
            document.getElementById('hero-date').innerText = new Date(latest.ts * 1000).toLocaleString();
        }

        // Render All Files Grid
        renderFilesGrid();

        // Render Calendar
        renderCalendar();
    }

    async function updateMetrics() {
        const res = await fetch('/api/data');
        const data = await res.json();

        // Timer
        document.getElementById('pass-relative').innerText = data.next_pass.relative;
        document.getElementById('pass-absolute').innerText = "at " + data.next_pass.absolute;

        // Disk
        document.getElementById('disk-percent').innerText = data.system.disk.percent + "%";
        document.getElementById('disk-details').innerText = `${data.system.disk.used_gb} GB / ${data.system.disk.total_gb} GB`;
        
        // Temp
        document.getElementById('temp').innerText = data.system.temp + "°C";

        // Tasks
        setTaskBtn('align', data.tasks.align);
        setTaskBtn('capture', data.tasks.capture);
        setTaskBtn('sync', data.tasks.sync);
    }

    function setTaskBtn(name, active) {
        document.getElementById(`dot-${name}`).className = active ? "status-dot active" : "status-dot";
        const btn = document.getElementById(`btn-${name}`);
        btn.innerText = active ? "Stop" : "Start";
        btn.className = active ? "btn-stop" : "";
        btn.onclick = () => control(active ? "stop" : `start_${name}`, name);
    }

    async function control(action, target) {
        await fetch('/api/control', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({action, target: target==='sync'?'sat-sync':(target==='align'?'alignment':'capture')})
        });
        setTimeout(updateMetrics, 500);
    }

    // --- CALENDAR LOGIC ---
    function renderCalendar() {
        const container = document.getElementById('cal-container');
        const title = document.getElementById('cal-title');
        container.innerHTML = ''; // Clear

        // 1. YEAR VIEW
        if(view === 'year') {
            title.innerText = currentDate.getFullYear();
            container.style.display = 'grid';
            container.style.gridTemplateColumns = 'repeat(4, 1fr)';
            container.style.gap = '10px';
            
            for(let m=0; m<12; m++) {
                const monthName = new Date(currentDate.getFullYear(), m).toLocaleString('default', {month:'long'});
                const div = document.createElement('div');
                div.className = 'cal-cell';
                div.innerHTML = `<strong>${monthName}</strong>`;
                
                // Check data
                if(hasData(currentDate.getFullYear(), m)) div.classList.add('has-data');
                
                div.onclick = () => {
                    currentDate.setMonth(m);
                    changeView('month');
                };
                container.appendChild(div);
            }
        }

        // 2. MONTH VIEW
        else if(view === 'month') {
            title.innerText = currentDate.toLocaleString('default', {month:'long', year:'numeric'});
            container.style.display = 'grid';
            container.style.gridTemplateColumns = 'repeat(7, 1fr)';
            
            const firstDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();
            const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 0).getDate();

            // Headers
            ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => container.innerHTML += `<div style="text-align:center; color:#94a3b8; font-size:0.8rem; padding:5px;">${d}</div>`);
            
            // Empty
            for(let i=0; i<firstDay; i++) container.innerHTML += `<div></div>`;

            // Days
            for(let d=1; d<=daysInMonth; d++) {
                const div = document.createElement('div');
                div.className = 'cal-cell';
                div.innerText = d;
                if(hasData(currentDate.getFullYear(), currentDate.getMonth(), d)) div.classList.add('has-data');
                div.onclick = () => {
                    if(div.classList.contains('has-data')) {
                        currentDate.setDate(d);
                        changeView('day');
                    } else {
                        alert("No images for this day.");
                    }
                };
                container.appendChild(div);
            }
        }

        // 3. DAY VIEW (List)
        else if(view === 'day') {
            title.innerText = currentDate.toDateString();
            container.style.display = 'flex';
            container.style.flexDirection = 'column';
            container.style.gap = '10px';

            const dayFiles = getFilesForDate(currentDate);
            if(dayFiles.length === 0) container.innerHTML = '<div style="color:#94a3b8; text-align:center;">No Images</div>';
            
            dayFiles.forEach(f => {
                const div = document.createElement('div');
                div.className = 'day-item';
                div.innerHTML = `
                    <img src="/images/${f.name}" class="day-thumb">
                    <div>
                        <div style="font-weight:bold">${new Date(f.ts*1000).toLocaleTimeString()}</div>
                        <div style="font-size:0.8rem; color:#94a3b8;">${f.size_mb} MB</div>
                    </div>
                `;
                div.onclick = () => openViewer(f.name);
                container.appendChild(div);
            });
        }
    }

    // --- HELPERS ---
    function hasData(year, month, day=null) {
        return allFiles.some(f => {
            const d = new Date(f.ts * 1000);
            if(day) return d.getFullYear() === year && d.getMonth() === month && d.getDate() === day;
            return d.getFullYear() === year && d.getMonth() === month;
        });
    }

    function getFilesForDate(date) {
        return allFiles.filter(f => {
            const d = new Date(f.ts * 1000);
            return d.toDateString() === date.toDateString();
        });
    }

    function changeView(newView) {
        view = newView;
        document.getElementById('view-select').value = newView;
        renderCalendar();
    }

    function calBack() {
        if(view === 'day') changeView('month');
        else if(view === 'month') changeView('year');
    }

    function renderFilesGrid() {
        const grid = document.getElementById('files-grid');
        grid.innerHTML = allFiles.map(f => `
            <div class="file-card" onclick="openViewer('${f.name}')">
                <img src="/images/${f.name}">
                <div class="file-info">${new Date(f.ts*1000).toLocaleDateString()}</div>
            </div>
        `).join('');
    }

    // --- TIMELAPSE / VIEWER ---
    function openViewer(imgName) {
        const modal = document.getElementById('viewer-modal');
        modal.style.display = 'flex';
        document.getElementById('modal-img').src = `/images/${imgName}`;
    }

    function closeModal() {
        document.getElementById('viewer-modal').style.display = 'none';
        stopSlideshow();
    }

    function playContextTimelapse() {
        // Filter files based on current view context
        let playlist = [];
        if(view === 'day') playlist = getFilesForDate(currentDate);
        else if(view === 'month') playlist = allFiles.filter(f => {
            const d = new Date(f.ts*1000);
            return d.getMonth() === currentDate.getMonth() && d.getFullYear() === currentDate.getFullYear();
        });
        else playlist = allFiles; // Year/All

        if(playlist.length === 0) return alert("No images to play.");
        
        // Start Slideshow
        const modal = document.getElementById('viewer-modal');
        modal.style.display = 'flex';
        let idx = playlist.length - 1; // Start from oldest
        
        slideshowInterval = setInterval(() => {
            if(idx < 0) { stopSlideshow(); return; }
            document.getElementById('modal-img').src = `/images/${playlist[idx].name}`;
            document.getElementById('modal-counter').innerText = ` Playing... (${idx+1} remaining)`;
            idx--;
        }, 200); // Speed
    }

    function stopSlideshow() {
        if(slideshowInterval) clearInterval(slideshowInterval);
        document.getElementById('modal-counter').innerText = "";
    }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);

    // Start
    loadData();
    updateMetrics();
    setInterval(updateMetrics, 5000); // Live data polling
</script>
</body>
</html>
